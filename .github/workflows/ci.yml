name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Run tests
        run: dotnet test tests/DotCarbon.Tests/DotCarbon.Tests.csproj -c Release

  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build solution
        run: dotnet build DotCarbon.slnx -c Release

  aot-safety:
    name: AOT/trim safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build with trim/AOT warnings as errors
        run: dotnet build DotCarbon.slnx -c Release -p:TreatWarningsAsErrors=true -p:NuGetAudit=false

  publish-output-validation:
    name: Publish output validation (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Validate publish output rules
        run: dotnet test tests/DotCarbon.Tests/DotCarbon.Tests.csproj -c Release --filter FullyQualifiedName~PublishOutputVerifierTests

  desktop-publish-smoke:
    name: Desktop publish smoke (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Publish fixture without installer
        run: dotnet run --project src/DotCarbon.Cli/DotCarbon.Cli.csproj -- bundle desktop --project tests/DotCarbon.Tests/fixtures/package-app --target ${{ matrix.rid }} --no-package
      - name: Verify publish output
        run: dotnet run --project src/DotCarbon.Cli/DotCarbon.Cli.csproj -- bundle desktop --project tests/DotCarbon.Tests/fixtures/package-app --target ${{ matrix.rid }} --no-package --verify

  desktop-package-smoke:
    name: Desktop package smoke (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            rid: osx-arm64
            artifact: tests/DotCarbon.Tests/fixtures/package-app/out/osx-arm64/Package Fixture.dmg
          - os: windows-latest
            rid: win-x64
            artifact: tests/DotCarbon.Tests/fixtures/package-app/out/Package Fixture.msi
          - os: ubuntu-latest
            rid: linux-x64
            artifact: tests/DotCarbon.Tests/fixtures/package-app/out/linux-x64/Package Fixture.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install WiX
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.*
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install Linux package tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y file desktop-file-utils
      - name: Package fixture
        run: dotnet run --project src/DotCarbon.Cli/DotCarbon.Cli.csproj -- bundle desktop --project tests/DotCarbon.Tests/fixtures/package-app --target ${{ matrix.rid }}
      - name: Verify package artifact
        shell: pwsh
        run: |
          $artifact = '${{ matrix.artifact }}'
          if (!(Test-Path $artifact)) { throw "Missing package artifact: $artifact" }
          $item = Get-Item $artifact
          if ($item.Length -le 0) { throw "Package artifact is empty: $artifact" }
      # Exercise the installer itself after validating the MSI artifact. Keep the verbose log focused
      # on Windows Installer error and rollback lines when installation fails.
      - name: Install + uninstall MSI (smoke)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msi = '${{ matrix.artifact }}'
          $log = 'msi-install.log'
          $install = Start-Process msiexec.exe -ArgumentList "/i `"$msi`" /quiet /norestart /l*v `"$log`"" -Wait -PassThru
          $code = $install.ExitCode
          Write-Host "msiexec /i exit code: $code"
          if (Test-Path $log) {
            Write-Host "----- msiexec log: error/return lines -----"
            Select-String -Path $log -Pattern 'Error|return value 3|Installation failed|1603|1619|1620|1625' |
              Select-Object -Last 30 | ForEach-Object { $_.Line }
            Write-Host "----- msiexec log: tail -----"
            Get-Content $log -Tail 20
          }
          # 0 = success; 3010 = success + reboot required (benign on CI).
          if ($code -eq 0 -or $code -eq 3010) {
            Write-Host "MSI installed (code $code); uninstalling."
            $uninstall = Start-Process msiexec.exe -ArgumentList "/x `"$msi`" /quiet /norestart" -Wait -PassThru
            if ($uninstall.ExitCode -in @(0, 3010)) {
              Write-Host "::notice::MSI installed and uninstalled cleanly."
            } else {
              Write-Host "::warning::MSI uninstall returned $($uninstall.ExitCode)."
            }
          } else {
            Write-Host "::warning::MSI install returned $code."
          }

  # Optional: the mobile host packages target net10.0-android / net10.0-ios and are not part of
  # DotCarbon.slnx, so they only build with the corresponding workload installed.
  android-host:
    name: Android host
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install Android workload
        run: dotnet workload install android
      - name: Build DotCarbon.Host.Android
        run: dotnet build src/DotCarbon.Host.Android/DotCarbon.Host.Android.csproj -c Release

  ios-host:
    name: iOS host
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install iOS workload
        run: dotnet workload install ios
      - name: Build DotCarbon.Host.iOS
        run: dotnet build src/DotCarbon.Host.iOS/DotCarbon.Host.iOS.csproj -c Release

  # Boot the real app on each desktop OS in deterministic smoke mode and assert the native host
  # reaches a clean shutdown. Platform-specific checks cover tray and menu initialization.
  desktop-launch-smoke:
    name: Desktop launch smoke (${{ matrix.os }})
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb dbus-x11 at-spi2-core libgtk-3-0 libglib2.0-0 libnotify4 \
            && (sudo apt-get install -y libwebkit2gtk-4.1-0 || sudo apt-get install -y libwebkit2gtk-4.0-37)
          # Task 2.9: without this the tray silently falls back to GtkStatusIcon and the
          # StatusNotifierItem path never runs, so the assert below would prove nothing. Tolerated if
          # the distro drops it — the assert keys off whether the library is actually present.
          sudo apt-get install -y libayatana-appindicator3-1 \
            || echo "::warning::libayatana-appindicator3-1 unavailable; the SNI tray path will not be covered"
      - name: Launch app in smoke mode
        working-directory: tests/DotCarbon.Tests/fixtures/package-app
        env:
          CARBON_SMOKE: "1"
          CARBON_SMOKE_MS: "3000"
        shell: bash
        run: |
          set +e
          : > smoke.log
          # Watchdog: the app self-exits in smoke mode. If it hangs (e.g. a window left unclosable),
          # stop it once the success marker is out (or after a deadline) so a hang can't burn the whole
          # job timeout — the marker assertions below are the source of truth either way.
          (
            for _ in $(seq 1 150); do
              grep -q "\[\[CARBON_SMOKE\]\] exit ok" smoke.log 2>/dev/null && break
              sleep 1
            done
            sleep 5
            pkill -f "PackageApp" 2>/dev/null || taskkill //IM PackageApp.exe //F >/dev/null 2>&1
          ) &
          watchdog=$!
          if [ "${{ runner.os }}" = "Linux" ]; then
            xvfb-run -a dotnet run --project src-carbon/PackageApp.csproj -c Release 2>&1 | tee smoke.log
            code=${PIPESTATUS[0]}
          else
            dotnet run --project src-carbon/PackageApp.csproj -c Release 2>&1 | tee smoke.log
            code=${PIPESTATUS[0]}
          fi
          kill "$watchdog" 2>/dev/null; wait "$watchdog" 2>/dev/null
          set -e
          # A non-zero exit is only a real failure if the app never reached its clean-exit marker.
          # Once the marker is out, a messy teardown exit (Linux 139, or a watchdog kill) is not the
          # thing under test — the feature assertions below are.
          if [ "$code" -ne 0 ]; then
            if grep -q "\[\[CARBON_SMOKE\]\] exit ok" smoke.log; then
              echo "::warning::${{ runner.os }} smoke process exited $code after the success markers (teardown/watchdog); continuing to assertions."
            else
              exit "$code"
            fi
          fi
      - name: Assert launch + clean exit (all platforms)
        working-directory: tests/DotCarbon.Tests/fixtures/package-app
        shell: bash
        run: |
          grep -q "\[\[CARBON_SMOKE\]\] boot" smoke.log || { echo "app did not boot"; exit 1; }
          grep -q "\[\[CARBON_SMOKE\]\] exit ok" smoke.log || { echo "app did not exit cleanly"; exit 1; }
          # Task 2.10: ui/dist/app.js drives the tray:*/menu:* commands over the bridge, which is what
          # catches an argument type missing from the assembly's serializer context — that builds
          # fine and only fails when a command is actually invoked.
          #
          # Only Linux can gate on it. On the macOS and Windows runners the webview never executes:
          # the app boots and Load() is called, but the log carries no bridge traffic at all, so the
          # marker cannot appear no matter how long the smoke waits. Linux runs under xvfb with a real
          # display and does execute it. So absence is reported rather than failed there, while a
          # reported *error* still fails everywhere — that is evidence of a real break, and the app
          # having driven the commands and failed is worth knowing on any OS.
          if grep -q "\[\[CARBON_JS_UI_ERR\]\]" smoke.log; then
            echo "the frontend could not drive the tray/menu commands"
            grep -a "\[\[CARBON_JS_UI_ERR\]\]" smoke.log; exit 1
          fi
          if grep -q "\[\[CARBON_JS_UI_OK\]\]" smoke.log; then
            echo "::notice::${{ runner.os }} frontend drove the tray/menu commands over the bridge"
          elif [ "${{ runner.os }}" = "Linux" ]; then
            echo "the frontend never reported driving the tray/menu commands"
            grep -a "SendWebMessage\|CARBON_JS_UI" smoke.log | tail -5
            exit 1
          else
            echo "::warning::${{ runner.os }} runner did not execute the webview; the JS tray/menu path is not covered by this job (Linux gates it)"
          fi
          # Task 3.1: show/hide/focus are native window ops (Photino provides none), so this runs on
          # the real NSWindow/GtkWindow with no webview involved — it gates on macOS and Linux, where
          # those windows exist, unlike the JS path above. Windows has an HWND but is unverified, so
          # its result is reported, not gated. The visibility transitions are deterministic; focus can
          # vary on a headless runner, so it is reported rather than asserted.
          win=$(grep -a "\[\[CARBON_WIN\]\]" smoke.log | tail -1 || true)
          if [ -n "$win" ]; then
            echo "::notice::${{ runner.os }} window controls: $win"
            case "${{ runner.os }}" in
              macOS|Linux)
                echo "$win" | grep -q "visible_initial=True hidden=False reshown=True" || {
                  echo "window show/hide did not change visibility as expected"; echo "$win"; exit 1; }
                ;;
            esac
          elif [ "${{ runner.os }}" != "Windows" ]; then
            echo "window controls (Task 3.1) never reported on ${{ runner.os }}"; exit 1
          else
            echo "::warning::Windows window controls did not report (unverified backend)"
          fi
          # Task 3.2: geometry. The min/max setters must land (Photino's own SetMinSize is a no-op, so
          # this guards the per-dimension workaround), and inner content must be no larger than the
          # outer frame. On macOS the title bar makes inner strictly shorter; Linux under a
          # decorationless xvfb legitimately has inner == outer, so the check is inner <= outer.
          geo=$(grep -a "\[\[CARBON_GEO\]\]" smoke.log | tail -1 || true)
          if [ -n "$geo" ]; then
            echo "::notice::${{ runner.os }} $geo"
            echo "$geo" | grep -q "min=640x480 max=1280x960" || {
              echo "set_min_size / set_max_size did not apply"; echo "$geo"; exit 1; }
            inner_h=$(echo "$geo" | sed -n 's/.*inner=[0-9]*x\([0-9]*\)@.*/\1/p')
            outer_h=$(echo "$geo" | sed -n 's/.*outer=[0-9]*x\([0-9]*\)@.*/\1/p')
            if [ -n "$inner_h" ] && [ -n "$outer_h" ] && [ "$inner_h" -gt "$outer_h" ]; then
              echo "inner content ($inner_h) taller than outer frame ($outer_h)"; exit 1
            fi
            if [ "${{ runner.os }}" = "macOS" ] && [ "$inner_h" -ge "$outer_h" ]; then
              echo "macOS inner content should be shorter than the frame by the title bar"; exit 1
            fi
          elif [ "${{ runner.os }}" != "Windows" ]; then
            echo "window geometry (Task 3.2) never reported on ${{ runner.os }}"; exit 1
          else
            echo "::warning::Windows window geometry did not report (unverified backend)"
          fi
          # Task 3.2 full-window mode: after switching to a transparent title bar, the content must
          # fill the whole frame (inner height == outer height). On macOS the title bar folds into the
          # content and the size is restored, so inner rises to the outer height. Linux keeps a normal
          # title bar (the call is a no-op there) but is decorationless under xvfb, so inner already
          # equals outer — the assertion holds either way. macOS is the meaningful gate.
          tb=$(grep -a "\[\[CARBON_TITLEBAR\]\]" smoke.log | tail -1 || true)
          if [ -n "$tb" ]; then
            echo "::notice::${{ runner.os }} $tb"
            ih=$(echo "$tb" | sed -n 's/.*inner_after=[0-9]*x\([0-9]*\) .*/\1/p')
            oh=$(echo "$tb" | sed -n 's/.*outer=[0-9]*x\([0-9]*\).*/\1/p')
            case "${{ runner.os }}" in
              macOS|Linux)
                [ "$ih" = "$oh" ] || { echo "transparent title bar did not fill the window ($ih != $oh)"; exit 1; }
                ;;
            esac
          elif [ "${{ runner.os }}" != "Windows" ]; then
            echo "title-bar style (Task 3.2) never reported on ${{ runner.os }}"; exit 1
          fi
          # Task 3.8: the native window-drag call must be safe with no active mouse press (it no-ops
          # rather than throwing). The actual window move is interactive and can't be driven headless,
          # so this only guards that the call path is wired and does not crash the app.
          if grep -q "\[\[CARBON_DRAG\]\] start_dragging ok" smoke.log; then
            echo "::notice::${{ runner.os }} window drag call is safe"
          elif [ "${{ runner.os }}" != "Windows" ]; then
            echo "start_dragging (Task 3.8) crashed or never reported on ${{ runner.os }}"
            grep -a "CARBON_DRAG\|CARBON_TITLEBAR" smoke.log | tail -3; exit 1
          fi
          # Task 3.3: chrome toggles read back off the real NSWindow. These are macOS-only readbacks
          # (the toggles run on every OS but only macOS exposes the state cheaply); the expected line
          # is the one measured by hand. Linux/Windows just run the toggles for crash-safety.
          chrome=$(grep -a "\[\[CARBON_CHROME\]\]" smoke.log | tail -1 || true)
          if [ -n "$chrome" ]; then
            echo "::notice::${{ runner.os }} $chrome"
            if [ "${{ runner.os }}" = "macOS" ]; then
              echo "$chrome" | grep -q "deco_off=False deco_on=True closable_off=False protected=True ignore_on=True ignore_off=False" || {
                echo "a window chrome toggle did not change the native state as expected"; echo "$chrome"; exit 1; }
            fi
          elif [ "${{ runner.os }}" = "macOS" ]; then
            echo "window chrome (Task 3.3) never reported on macOS"; exit 1
          fi
          # Task 3.4: cursor. Position is warped then read back off CoreGraphics on macOS — a few pixels
          # of tolerance covers HiDPI rounding. The other cursor setters run everywhere for crash-safety.
          cursor=$(grep -a "\[\[CARBON_CURSOR\]\]" smoke.log | tail -1 || true)
          if [ -n "$cursor" ]; then
            echo "::notice::${{ runner.os }} $cursor"
            if [ "${{ runner.os }}" = "macOS" ]; then
              dx=$(echo "$cursor" | sed -n 's/.* dx=\([0-9]*\) .*/\1/p')
              dy=$(echo "$cursor" | sed -n 's/.* dy=\([0-9]*\)$/\1/p')
              if [ -z "$dx" ] || [ -z "$dy" ] || [ "$dx" -gt 2 ] || [ "$dy" -gt 2 ]; then
                echo "set_cursor_position did not land on target"; echo "$cursor"; exit 1
              fi
            fi
          elif [ "${{ runner.os }}" = "macOS" ]; then
            echo "cursor (Task 3.4) never reported on macOS"; exit 1
          fi
          # Task 3.5: monitors. Pure Photino readback (no webview, no libobjc), so it runs on every OS;
          # exact resolution/scale vary per runner, so only the invariants are asserted — at least one
          # display, a primary, and a positive scale factor. Hard on macOS, reported elsewhere.
          mon=$(grep -a "\[\[CARBON_MON\]\]" smoke.log | tail -1 || true)
          if [ -n "$mon" ]; then
            echo "::notice::${{ runner.os }} $mon"
            if [ "${{ runner.os }}" = "macOS" ]; then
              count=$(echo "$mon" | sed -n 's/.*count=\([0-9]*\) .*/\1/p')
              scale=$(echo "$mon" | sed -n 's/.* scale=\([0-9.]*\).*/\1/p')
              echo "$mon" | grep -q "primary=null" && { echo "no primary monitor reported"; exit 1; }
              [ -n "$count" ] && [ "$count" -ge 1 ] || { echo "no monitors reported"; echo "$mon"; exit 1; }
              awk "BEGIN{exit !($scale > 0)}" || { echo "non-positive scale factor: $scale"; exit 1; }
            fi
          elif [ "${{ runner.os }}" = "macOS" ]; then
            echo "monitors (Task 3.5) never reported on macOS"; exit 1
          fi
          # Task 3.6: theme. On macOS the window's effectiveAppearance reflects a setTheme override, so
          # dark→dark and light→light is deterministic regardless of the OS theme. Windows reads the OS
          # theme (its override is a title-bar-only DWM flag) so it isn't asserted; Linux via GtkSettings
          # is reported. Hard on macOS.
          theme=$(grep -a "\[\[CARBON_THEME\]\]" smoke.log | tail -1 || true)
          if [ -n "$theme" ]; then
            echo "::notice::${{ runner.os }} $theme"
            if [ "${{ runner.os }}" = "macOS" ]; then
              echo "$theme" | grep -q "after_dark=dark after_light=light" || {
                echo "setTheme override did not change the effective theme"; echo "$theme"; exit 1; }
            fi
          elif [ "${{ runner.os }}" = "macOS" ]; then
            echo "theme (Task 3.6) never reported on macOS"; exit 1
          fi
          # Task 3.9: dock badge. macOS reads it back off the dock tile — set "7" then clear. Taskbar
          # progress is Windows-only and unverifiable here; it just runs for crash-safety.
          badge=$(grep -a "\[\[CARBON_BADGE\]\]" smoke.log | tail -1 || true)
          if [ -n "$badge" ]; then
            echo "::notice::${{ runner.os }} $badge"
            if [ "${{ runner.os }}" = "macOS" ]; then
              echo "$badge" | grep -q "set=7 cleared=null" || {
                echo "dock badge did not set/clear as expected"; echo "$badge"; exit 1; }
            fi
          elif [ "${{ runner.os }}" = "macOS" ]; then
            echo "badge (Task 3.9) never reported on macOS"; exit 1
          fi
          # Task 3.10: window effect. macOS inserts an NSVisualEffectView and the material reads back
          # (sidebar = 7); "none" removes it (-1). Windows applies a DWM backdrop (unverifiable here).
          effect=$(grep -a "\[\[CARBON_EFFECT\]\]" smoke.log | tail -1 || true)
          if [ -n "$effect" ]; then
            echo "::notice::${{ runner.os }} $effect"
            if [ "${{ runner.os }}" = "macOS" ]; then
              echo "$effect" | grep -q "sidebar_material=7 after_none=-1" || {
                echo "window effect view was not inserted/removed as expected"; echo "$effect"; exit 1; }
            fi
          elif [ "${{ runner.os }}" = "macOS" ]; then
            echo "window effect (Task 3.10) never reported on macOS"; exit 1
          fi
      - name: Assert tray + menu (macOS — verified path)
        if: runner.os == 'macOS'
        working-directory: tests/DotCarbon.Tests/fixtures/package-app
        shell: bash
        run: |
          grep -q "System tray ready" smoke.log || { echo "macOS tray did not initialize"; exit 1; }
          grep -q "Native menu ready" smoke.log || { echo "macOS menu did not initialize"; exit 1; }
          # Task 2.3: the tray is mutable at runtime — onReady must fire and the setters must run.
          grep -q "Tray mutation applied" smoke.log || { echo "macOS tray onReady/mutation did not run"; exit 1; }
          # Task 2.4: menu items are addressable + mutable at runtime.
          grep -q "Menu mutation applied" smoke.log || { echo "macOS menu onReady/mutation did not run"; exit 1; }
          if grep -qE "Tray update failed|Tray onReady failed|Menu update failed|Menu onReady failed" smoke.log; then
            echo "macOS tray/menu mutation reported an error"
            grep -E "Tray update failed|Tray onReady failed|Menu update failed|Menu onReady failed" smoke.log; exit 1
          fi
          # Task 2.8: the fixture registers a tray event handler, which puts macOS on the takeover
          # path (we own the status button and pop the menu ourselves). "System tray ready" above
          # therefore proves that path builds. The events themselves need a pointer over the menu
          # bar, which a CI runner has not got — they were verified by hand on a real desktop.
          if grep -q "Tray event failed" smoke.log; then
            echo "macOS tray event handling reported an error"
            grep -a "Tray event failed" smoke.log; exit 1
          fi
          # Task 2.5: the fixture sets a real PNG tray icon; a load failure must not pass silently.
          if grep -qE "could not load the icon|icon file not found|could not decode icon" smoke.log; then
            echo "macOS tray icon failed to load"
            grep -E "could not load the icon|icon file not found|could not decode icon" smoke.log; exit 1
          fi
          # Task 2.6: the fixture's second menu ("Edit") is built entirely from predefined roles, so
          # the top-level count reaching 2 is what proves role items were constructed rather than
          # throwing. The roles' selectors/targets were verified against a live NSMenu by hand.
          grep -q "Native menu ready (2 top-level menu(s))" smoke.log || {
            echo "macOS predefined-role menu was not built"; grep -a "Native menu" smoke.log; exit 1; }
      - name: Report tray status (Windows/Linux)
        if: runner.os != 'macOS'
        working-directory: tests/DotCarbon.Tests/fixtures/package-app
        shell: bash
        run: |
          if grep -q "System tray ready" smoke.log; then
            echo "::notice::${{ runner.os }} tray initialized"
          else
            echo "::warning::${{ runner.os }} tray did not report ready"
          fi
          # Task 2.9: when libayatana-appindicator is present, Linux must take the StatusNotifierItem
          # path. Silently degrading to GtkStatusIcon is precisely the bug worth catching, so that
          # combination fails the job; a missing library is an environment gap, not a code fault, and
          # only warns. Neither case can assert the icon is *rendered* — that needs a panel
          # implementing the SNI host, which a headless runner has not got.
          if [ "${{ runner.os }}" = "Linux" ]; then
            if ! ldconfig -p | grep -q libayatana-appindicator3; then
              echo "::warning::libayatana-appindicator absent; SNI tray path not covered by this run"
            elif grep -q "via appindicator" smoke.log; then
              echo "::notice::Linux tray used StatusNotifierItem"
            else
              echo "::error::Linux tray fell back to GtkStatusIcon despite libayatana-appindicator being installed"
              grep -a "System tray ready\|appindicator\|Tray:" smoke.log | tail -5
              exit 1
            fi
          fi
          # Task 2.3 runtime mutation — reported (not gated) on these backends, which are only
          # verified by this job rather than on a real desktop.
          for kind in Tray Menu; do
            if grep -q "$kind mutation applied" smoke.log; then
              echo "::notice::${{ runner.os }} $kind runtime mutation ran"
            else
              echo "::warning::${{ runner.os }} $kind runtime mutation did not run"
            fi
          done
          if grep -qE "Tray update failed|Tray onReady failed|Menu update failed|Menu onReady failed" smoke.log; then
            echo "::warning::${{ runner.os }} tray/menu mutation reported an error"
            grep -E "Tray update failed|Tray onReady failed|Menu update failed|Menu onReady failed" smoke.log | tail -5
          fi
          # Task 2.8 — tray pointer events; same caveat as macOS, no pointer on a runner.
          if grep -q "Tray event failed" smoke.log; then
            echo "::warning::${{ runner.os }} tray event handling reported an error"
            grep -a "Tray event failed" smoke.log | tail -5
          fi
          if grep -qE "could not load the icon|icon file not found|could not decode icon|GDI\+ startup failed" smoke.log; then
            echo "::warning::${{ runner.os }} tray icon failed to load"
            grep -E "could not load the icon|icon file not found|could not decode icon|GDI\+ startup failed" smoke.log | tail -5
          fi
      # Phase 2 (Tasks 2.1/2.2): Windows and Linux now have real app-menu backends (Win32 HMENU via
      # SetMenu; GtkMenuBar re-parented above the webview), replacing the old no-op stubs. Asserted
      # hard on both so a broken backend is unambiguous rather than a warning nobody reads.
      - name: Assert native menu (Windows/Linux backends)
        if: runner.os != 'macOS'
        working-directory: tests/DotCarbon.Tests/fixtures/package-app
        shell: bash
        run: |
          if grep -q "Native menu ready" smoke.log; then
            echo "::notice::${{ runner.os }} native menu initialized"
          else
            echo "::error::${{ runner.os }} native menu did not initialize"
            grep -aiE "menu|gtk|hmenu|setmenu|window handle|display" smoke.log | tail -20
            exit 1
          fi
          # Task 2.6: these backends implement only the window roles (Quit/CloseWindow/Minimize) and
          # skip the macOS-only ones, but building the role menu must not throw either.
          grep -q "Native menu ready (2 top-level menu(s))" smoke.log || {
            echo "::error::${{ runner.os }} predefined-role menu was not built"
            grep -a "Native menu" smoke.log; exit 1; }
