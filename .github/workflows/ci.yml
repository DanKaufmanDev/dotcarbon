name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Run tests
        run: dotnet test tests/DotCarbon.Tests/DotCarbon.Tests.csproj -c Release

  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build solution
        run: dotnet build DotCarbon.slnx -c Release

  aot-safety:
    name: AOT/trim safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Build with trim/AOT warnings as errors
        run: dotnet build DotCarbon.slnx -c Release -p:TreatWarningsAsErrors=true -p:NuGetAudit=false

  publish-output-validation:
    name: Publish output validation (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Validate publish output rules
        run: dotnet test tests/DotCarbon.Tests/DotCarbon.Tests.csproj -c Release --filter FullyQualifiedName~PublishOutputVerifierTests

  desktop-publish-smoke:
    name: Desktop publish smoke (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            rid: osx-arm64
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Publish fixture without installer
        run: dotnet run --project src/DotCarbon.Cli/DotCarbon.Cli.csproj -- bundle desktop --project tests/DotCarbon.Tests/fixtures/package-app --target ${{ matrix.rid }} --no-package
      - name: Verify publish output
        run: dotnet run --project src/DotCarbon.Cli/DotCarbon.Cli.csproj -- bundle desktop --project tests/DotCarbon.Tests/fixtures/package-app --target ${{ matrix.rid }} --no-package --verify

  desktop-package-smoke:
    name: Desktop package smoke (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            rid: osx-arm64
            artifact: tests/DotCarbon.Tests/fixtures/package-app/out/osx-arm64/Package Fixture.dmg
          - os: windows-latest
            rid: win-x64
            artifact: tests/DotCarbon.Tests/fixtures/package-app/out/Package Fixture.msi
          - os: ubuntu-latest
            rid: linux-x64
            artifact: tests/DotCarbon.Tests/fixtures/package-app/out/linux-x64/Package Fixture.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install WiX
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 4.*
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install Linux package tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y file desktop-file-utils
      - name: Package fixture
        run: dotnet run --project src/DotCarbon.Cli/DotCarbon.Cli.csproj -- bundle desktop --project tests/DotCarbon.Tests/fixtures/package-app --target ${{ matrix.rid }}
      - name: Verify package artifact
        shell: pwsh
        run: |
          $artifact = '${{ matrix.artifact }}'
          if (!(Test-Path $artifact)) { throw "Missing package artifact: $artifact" }
          $item = Get-Item $artifact
          if ($item.Length -le 0) { throw "Package artifact is empty: $artifact" }
      # Exercise the installer itself after validating the MSI artifact. Keep the verbose log focused
      # on Windows Installer error and rollback lines when installation fails.
      - name: Install + uninstall MSI (smoke)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $msi = '${{ matrix.artifact }}'
          $log = 'msi-install.log'
          $install = Start-Process msiexec.exe -ArgumentList "/i `"$msi`" /quiet /norestart /l*v `"$log`"" -Wait -PassThru
          $code = $install.ExitCode
          Write-Host "msiexec /i exit code: $code"
          if (Test-Path $log) {
            Write-Host "----- msiexec log: error/return lines -----"
            Select-String -Path $log -Pattern 'Error|return value 3|Installation failed|1603|1619|1620|1625' |
              Select-Object -Last 30 | ForEach-Object { $_.Line }
            Write-Host "----- msiexec log: tail -----"
            Get-Content $log -Tail 20
          }
          # 0 = success; 3010 = success + reboot required (benign on CI).
          if ($code -eq 0 -or $code -eq 3010) {
            Write-Host "MSI installed (code $code); uninstalling."
            $uninstall = Start-Process msiexec.exe -ArgumentList "/x `"$msi`" /quiet /norestart" -Wait -PassThru
            if ($uninstall.ExitCode -in @(0, 3010)) {
              Write-Host "::notice::MSI installed and uninstalled cleanly."
            } else {
              Write-Host "::warning::MSI uninstall returned $($uninstall.ExitCode)."
            }
          } else {
            Write-Host "::warning::MSI install returned $code."
          }

  # Optional: the mobile host packages target net10.0-android / net10.0-ios and are not part of
  # DotCarbon.slnx, so they only build with the corresponding workload installed.
  android-host:
    name: Android host
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install Android workload
        run: dotnet workload install android
      - name: Build DotCarbon.Host.Android
        run: dotnet build src/DotCarbon.Host.Android/DotCarbon.Host.Android.csproj -c Release

  ios-host:
    name: iOS host
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install iOS workload
        run: dotnet workload install ios
      - name: Build DotCarbon.Host.iOS
        run: dotnet build src/DotCarbon.Host.iOS/DotCarbon.Host.iOS.csproj -c Release

  # Boot the real app on each desktop OS in deterministic smoke mode and assert the native host
  # reaches a clean shutdown. Platform-specific checks cover tray and menu initialization.
  desktop-launch-smoke:
    name: Desktop launch smoke (${{ matrix.os }})
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Install Linux GUI dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb dbus-x11 at-spi2-core libgtk-3-0 libglib2.0-0 libnotify4 \
            && (sudo apt-get install -y libwebkit2gtk-4.1-0 || sudo apt-get install -y libwebkit2gtk-4.0-37)
          # Task 2.9: without this the tray silently falls back to GtkStatusIcon and the
          # StatusNotifierItem path never runs, so the assert below would prove nothing. Tolerated if
          # the distro drops it — the assert keys off whether the library is actually present.
          sudo apt-get install -y libayatana-appindicator3-1 \
            || echo "::warning::libayatana-appindicator3-1 unavailable; the SNI tray path will not be covered"
      - name: Launch app in smoke mode
        working-directory: tests/DotCarbon.Tests/fixtures/package-app
        env:
          CARBON_SMOKE: "1"
          CARBON_SMOKE_MS: "3000"
        shell: bash
        run: |
          set +e
          if [ "${{ runner.os }}" = "Linux" ]; then
            xvfb-run -a dotnet run --project src-carbon/PackageApp.csproj -c Release 2>&1 | tee smoke.log
            code=${PIPESTATUS[0]}
          else
            dotnet run --project src-carbon/PackageApp.csproj -c Release 2>&1 | tee smoke.log
            code=${PIPESTATUS[0]}
          fi
          set -e
          if [ "$code" -ne 0 ]; then
            if [ "${{ runner.os }}" = "Linux" ] && [ "$code" -eq 139 ] && \
               grep -q "\[\[CARBON_SMOKE\]\] boot" smoke.log && \
               grep -q "\[\[CARBON_SMOKE\]\] exit ok" smoke.log; then
              echo "::warning::Linux Photino/WebKit exited with 139 after the smoke success markers; continuing so the assertions can report the real app result."
            else
              exit "$code"
            fi
          fi
      - name: Assert launch + clean exit (all platforms)
        working-directory: tests/DotCarbon.Tests/fixtures/package-app
        shell: bash
        run: |
          grep -q "\[\[CARBON_SMOKE\]\] boot" smoke.log || { echo "app did not boot"; exit 1; }
          grep -q "\[\[CARBON_SMOKE\]\] exit ok" smoke.log || { echo "app did not exit cleanly"; exit 1; }
      - name: Assert tray + menu (macOS — verified path)
        if: runner.os == 'macOS'
        working-directory: tests/DotCarbon.Tests/fixtures/package-app
        shell: bash
        run: |
          grep -q "System tray ready" smoke.log || { echo "macOS tray did not initialize"; exit 1; }
          grep -q "Native menu ready" smoke.log || { echo "macOS menu did not initialize"; exit 1; }
          # Task 2.3: the tray is mutable at runtime — onReady must fire and the setters must run.
          grep -q "Tray mutation applied" smoke.log || { echo "macOS tray onReady/mutation did not run"; exit 1; }
          # Task 2.4: menu items are addressable + mutable at runtime.
          grep -q "Menu mutation applied" smoke.log || { echo "macOS menu onReady/mutation did not run"; exit 1; }
          if grep -qE "Tray update failed|Tray onReady failed|Menu update failed|Menu onReady failed" smoke.log; then
            echo "macOS tray/menu mutation reported an error"
            grep -E "Tray update failed|Tray onReady failed|Menu update failed|Menu onReady failed" smoke.log; exit 1
          fi
          # Task 2.8: the fixture registers a tray event handler, which puts macOS on the takeover
          # path (we own the status button and pop the menu ourselves). "System tray ready" above
          # therefore proves that path builds. The events themselves need a pointer over the menu
          # bar, which a CI runner has not got — they were verified by hand on a real desktop.
          if grep -q "Tray event failed" smoke.log; then
            echo "macOS tray event handling reported an error"
            grep -a "Tray event failed" smoke.log; exit 1
          fi
          # Task 2.5: the fixture sets a real PNG tray icon; a load failure must not pass silently.
          if grep -qE "could not load the icon|icon file not found|could not decode icon" smoke.log; then
            echo "macOS tray icon failed to load"
            grep -E "could not load the icon|icon file not found|could not decode icon" smoke.log; exit 1
          fi
          # Task 2.6: the fixture's second menu ("Edit") is built entirely from predefined roles, so
          # the top-level count reaching 2 is what proves role items were constructed rather than
          # throwing. The roles' selectors/targets were verified against a live NSMenu by hand.
          grep -q "Native menu ready (2 top-level menu(s))" smoke.log || {
            echo "macOS predefined-role menu was not built"; grep -a "Native menu" smoke.log; exit 1; }
      - name: Report tray status (Windows/Linux)
        if: runner.os != 'macOS'
        working-directory: tests/DotCarbon.Tests/fixtures/package-app
        shell: bash
        run: |
          if grep -q "System tray ready" smoke.log; then
            echo "::notice::${{ runner.os }} tray initialized"
          else
            echo "::warning::${{ runner.os }} tray did not report ready"
          fi
          # Task 2.9: when libayatana-appindicator is present, Linux must take the StatusNotifierItem
          # path. Silently degrading to GtkStatusIcon is precisely the bug worth catching, so that
          # combination fails the job; a missing library is an environment gap, not a code fault, and
          # only warns. Neither case can assert the icon is *rendered* — that needs a panel
          # implementing the SNI host, which a headless runner has not got.
          if [ "${{ runner.os }}" = "Linux" ]; then
            if ! ldconfig -p | grep -q libayatana-appindicator3; then
              echo "::warning::libayatana-appindicator absent; SNI tray path not covered by this run"
            elif grep -q "via appindicator" smoke.log; then
              echo "::notice::Linux tray used StatusNotifierItem"
            else
              echo "::error::Linux tray fell back to GtkStatusIcon despite libayatana-appindicator being installed"
              grep -a "System tray ready\|appindicator\|Tray:" smoke.log | tail -5
              exit 1
            fi
          fi
          # Task 2.3 runtime mutation — reported (not gated) on these backends, which are only
          # verified by this job rather than on a real desktop.
          for kind in Tray Menu; do
            if grep -q "$kind mutation applied" smoke.log; then
              echo "::notice::${{ runner.os }} $kind runtime mutation ran"
            else
              echo "::warning::${{ runner.os }} $kind runtime mutation did not run"
            fi
          done
          if grep -qE "Tray update failed|Tray onReady failed|Menu update failed|Menu onReady failed" smoke.log; then
            echo "::warning::${{ runner.os }} tray/menu mutation reported an error"
            grep -E "Tray update failed|Tray onReady failed|Menu update failed|Menu onReady failed" smoke.log | tail -5
          fi
          # Task 2.8 — tray pointer events; same caveat as macOS, no pointer on a runner.
          if grep -q "Tray event failed" smoke.log; then
            echo "::warning::${{ runner.os }} tray event handling reported an error"
            grep -a "Tray event failed" smoke.log | tail -5
          fi
          if grep -qE "could not load the icon|icon file not found|could not decode icon|GDI\+ startup failed" smoke.log; then
            echo "::warning::${{ runner.os }} tray icon failed to load"
            grep -E "could not load the icon|icon file not found|could not decode icon|GDI\+ startup failed" smoke.log | tail -5
          fi
      # Phase 2 (Tasks 2.1/2.2): Windows and Linux now have real app-menu backends (Win32 HMENU via
      # SetMenu; GtkMenuBar re-parented above the webview), replacing the old no-op stubs. Asserted
      # hard on both so a broken backend is unambiguous rather than a warning nobody reads.
      - name: Assert native menu (Windows/Linux backends)
        if: runner.os != 'macOS'
        working-directory: tests/DotCarbon.Tests/fixtures/package-app
        shell: bash
        run: |
          if grep -q "Native menu ready" smoke.log; then
            echo "::notice::${{ runner.os }} native menu initialized"
          else
            echo "::error::${{ runner.os }} native menu did not initialize"
            grep -aiE "menu|gtk|hmenu|setmenu|window handle|display" smoke.log | tail -20
            exit 1
          fi
          # Task 2.6: these backends implement only the window roles (Quit/CloseWindow/Minimize) and
          # skip the macOS-only ones, but building the role menu must not throw either.
          grep -q "Native menu ready (2 top-level menu(s))" smoke.log || {
            echo "::error::${{ runner.os }} predefined-role menu was not built"
            grep -a "Native menu" smoke.log; exit 1; }
