# Build generated mobile shells, boot them on an emulator or simulator, and require a successful
# JavaScript-to-C# bridge call. These jobs stay separate from the faster desktop matrix.
name: Mobile smoke

on:
  workflow_dispatch:
  push:
    branches: ['**']

permissions:
  contents: read

jobs:
  android-emulator-smoke:
    name: Android emulator smoke
    runs-on: ubuntu-latest
    env:
      CARBON_MOBILE_SMOKE_LOCAL_HOSTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Install Android workload
        run: dotnet workload install android --skip-manifest-update
      - name: Scaffold Android shell + bundle APK
        run: |
          set -euxo pipefail
          test -f tests/mobile-smoke/ui/dist/index.html
          dotnet run --project src/DotCarbon.Cli/DotCarbon.Cli.csproj -- \
            platform add android --project tests/mobile-smoke
          # Ensure the Android API level the app targets is installed on the runner (XA5207 otherwise).
          dotnet build tests/mobile-smoke/.carbon/platforms/android/*.Android.csproj \
            -t:InstallAndroidDependencies -f net10.0-android -p:AcceptAndroidSDKLicenses=true || true
          dotnet run --project src/DotCarbon.Cli/DotCarbon.Cli.csproj -- \
            bundle android --project tests/mobile-smoke --apk --debug --allow-unsupported-plugins
          APK=$(find tests/mobile-smoke/.carbon/platforms/android/bin/Debug -name "*-Signed.apk" -type f 2>/dev/null | sort | tail -1 || true)
          if [ -z "$APK" ]; then
            APK=$(find tests/mobile-smoke/.carbon/platforms/android/bin/Debug -name "*.apk" -type f 2>/dev/null | sort | tail -1 || true)
          fi
          [ -n "$APK" ] || { echo "::error::no APK was produced"; exit 1; }
          echo "APK=$APK" >> "$GITHUB_ENV"
          ls -lh "$APK"
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Boot emulator + assert WebView
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          arch: x86_64
          target: google_apis
          # The action runs `script:` one line per `sh -c` — multi-line shell and variables do not
          # survive between lines — so the actual logic lives in a file that can also be run locally.
          script: bash tests/mobile-smoke/ci/android-smoke.sh "$APK"

  ios-simulator-smoke:
    name: iOS simulator smoke
    runs-on: macos-latest
    # Blocking. This used to be continue-on-error because `simctl spawn log show` returned system noise
    # without the app's lines. The capture is now done with `simctl launch --console-pty`, which
    # attaches a pty to the app's stdout and does surface .NET Console output — verified locally
    # against the same bundled (embedded/Production) .app this job builds.
    env:
      CARBON_MOBILE_SMOKE_LOCAL_HOSTS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.301
      - name: Install iOS workload
        run: dotnet workload install ios --skip-manifest-update
      # Pick the Xcode that matches the *installed* workload rather than hardcoding a path: GitHub
      # rotates Xcode versions out of the runner image, and a stale hardcoded path fails the job
      # instantly. .NET for iOS requires the Xcode whose SDK matches the workload's major.minor.
      - name: Select Xcode matching the iOS workload
        run: |
          set -uo pipefail
          echo "Xcodes available on this runner:"
          ls -d /Applications/Xcode*.app 2>/dev/null || true

          WANT=$(dotnet workload list | awk '$1=="ios" {print $2}' | cut -d. -f1,2)
          echo "Installed iOS workload expects Xcode ~${WANT}"
          if [ -z "$WANT" ]; then
            echo "::error::Could not determine the installed iOS workload version."
            dotnet workload list
            exit 1
          fi

          PICK=""
          for app in /Applications/Xcode*.app; do
            [ -d "$app/Contents/Developer" ] || continue
            VER=$(/usr/bin/plutil -extract CFBundleShortVersionString raw "$app/Contents/version.plist" 2>/dev/null || echo "")
            echo "  $app -> ${VER:-unknown}"
            case "$VER" in
              "$WANT"|"$WANT".*) PICK="$app"; break ;;
            esac
          done

          if [ -z "$PICK" ]; then
            echo "::error::No Xcode matching the iOS workload (${WANT}) on this runner (see the list above)."
            echo "Either pin the workload to a version this image ships, or update the workload."
            exit 1
          fi

          echo "Selecting $PICK"
          sudo xcode-select --switch "$PICK/Contents/Developer"
          xcodebuild -version
      - name: Scaffold iOS shell + bundle for the simulator
        run: |
          set -euxo pipefail
          test -f tests/mobile-smoke/ui/dist/index.html
          dotnet run --project src/DotCarbon.Cli/DotCarbon.Cli.csproj -- \
            platform add ios --project tests/mobile-smoke
          dotnet run --project src/DotCarbon.Cli/DotCarbon.Cli.csproj -- \
            bundle ios --project tests/mobile-smoke --simulator --allow-unsupported-plugins
          APP=$(find tests/mobile-smoke/out/ios/simulator -name "*.app" -type d 2>/dev/null | sort | tail -1 || true)
          [ -n "$APP" ] || { echo "::error::no .app was produced"; exit 1; }
          echo "APP=$APP" >> "$GITHUB_ENV"
          du -sh "$APP"
      - name: Boot simulator + assert WebView
        run: |
          set -euxo pipefail
          # Pick an iPhone specifically — the first "available" device can be a Watch/TV, which
          # would reject an iOS .app install.
          DEVICE=$(xcrun simctl list devices available | grep -m1 "iPhone" | grep -oE '[0-9A-F-]{36}' || true)
          if [ -z "$DEVICE" ]; then
            echo "No available iPhone simulator; creating one."
            xcrun simctl list devicetypes | grep -i iPhone | tail -5 || true
            DEVICE=$(xcrun simctl create carbon-sim com.apple.CoreSimulator.SimDeviceType.iPhone-15)
          fi
          echo "device: $DEVICE"
          xcrun simctl boot "$DEVICE" || true
          xcrun simctl bootstatus "$DEVICE" -b
          echo "installing $APP"
          xcrun simctl install "$DEVICE" "$APP"

          # .NET Console output reaches the simulator through os_log. `simctl launch --stdout=` file
          # redirection misses it, and `simctl spawn log show` returns system noise without the app's
          # lines on a hosted runner. `--console-pty` attaches a pty to the app's stdio and does carry
          # it, so stream that to a file and poll. The launch blocks while streaming, hence the &.
          xcrun simctl launch --console-pty --terminate-running-process \
            "$DEVICE" dev.dotcarbon.mobilesmoke > sim.log 2>&1 &
          LAUNCH_PID=$!

          # Assert the round trip: [[CARBON_WEB_READY]] means JS reached C#, [[CARBON_BRIDGE_OK]] means
          # the reply reached JS. Waiting on the second covers both directions.
          for _ in $(seq 1 45); do
            if grep -q "\[\[CARBON_BRIDGE_OK\]\]" sim.log 2>/dev/null; then
              echo "bridge round-trip completed on the simulator"
              grep -aE "CARBON_WEB_READY|CARBON_BRIDGE_OK" sim.log
              kill "$LAUNCH_PID" 2>/dev/null || true
              exit 0
            fi
            sleep 2
          done

          kill "$LAUNCH_PID" 2>/dev/null || true
          echo "::error::no [[CARBON_BRIDGE_OK]] marker from the simulator"
          echo "----- app stdout -----"
          tail -80 sim.log || true
          exit 1
