<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>DotCarbon</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #1a1a1a;
            color: white;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background: #6366f1;
            color: white;
            margin-top: 16px;
        }
        #result {
            margin-top: 24px;
            font-size: 20px;
            color: #a5f3fc;
        }
    </style>
</head>
<body>
    <h1>DotCarbon Bridge Test</h1>
    <button onclick="callCSharp()">Call C#</button>
    <div id="result">Waiting...</div>

    <script>
        // This is the JS side of the bridge
        // window.external.sendMessage is how Photino exposes the bridge
        const pending = new Map();

        // Photino calls this when C# sends a message back
        window.external.receiveMessage(message => {
            const data = JSON.parse(message);
            const resolve = pending.get(data.id);
            if (resolve) {
                pending.delete(data.id);
                resolve(data);
            }
        });

        // This is our invoke() function
        function invoke(command, payload = {}) {
            return new Promise((resolve) => {
                const id = crypto.randomUUID();
                pending.set(id, resolve);
                window.external.sendMessage(JSON.stringify({ id, command, payload }));
            });
        }

        // Test it
        async function callCSharp() {
            document.getElementById('result').textContent = 'Calling C#...';
            const result = await invoke('greet', { name: 'DotCarbon' });
            document.getElementById('result').textContent = result.data;
        }
    </script>
</body>
</html>
